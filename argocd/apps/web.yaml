apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/KaPhuDong/gitops-lab.git
    path: k8s
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
